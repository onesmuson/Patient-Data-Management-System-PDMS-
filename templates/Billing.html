{% extends "base.html" %}
{% block title %}Billing{% endblock %}

{% block content %}
<h1>Billing</h1>
<form method="POST">
    <select name="patient_id">
        {% for p in patients %}
            <option value="{{ p.id }}">{{ p.full_name }}</option>
        {% endfor %}
    </select>
    <input type="number" step="0.01" name="total_amount" placeholder="Total Amount">
    <input type="date" name="date_issued">
    <select name="status">
        <option>Paid</option>
        <option>Unpaid</option>
    </select>
    <button type="submit">Add Bill</button>
</form>

<table>
    <tr><th>ID</th><th>Patient</th><th>Amount</th><th>Date</th><th>Status</th></tr>
    {% for bill in bills %}
    <tr>
        <td>{{ bill.id }}</td>
        <td>{{ bill.patient.full_name }}</td>
        <td>{{ bill.total_amount }}</td>
        <td>{{ bill.date_issued }}</td>
        <td>{{ bill.status }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
