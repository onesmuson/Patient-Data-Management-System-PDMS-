{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Billing</h2>

<div class="card shadow mb-4">
    <div class="card-header bg-primary text-white">
        <h5>Add New Bill</h5>
    </div>

    <div class="card-body">
        <form method="POST" action="{{ url_for('billing') }}">
            <div class="row">

                <div class="col-md-4 mb-3">
                    <label class="form-label">Patient Name</label>
                    <input type="text" name="patient_name" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Service Provided</label>
                    <input type="text" name="service" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Amount</label>
                    <input type="number" name="amount" class="form-control" required>
                </div>

            </div>

            <button type="submit" class="btn btn-success">Add Bill</button>
        </form>
    </div>
</div>

<h4 class="mt-5">All Billing Records</h4>

<table class="table table-striped table-bordered shadow-sm mt-3">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Patient</th>
            <th>Service</th>
            <th>Amount</th>
            <th>Date</th>
        </tr>
    </thead>

    <tbody>
        {% for bill in bills %}
        <tr>
            <td>{{ bill.id }}</td>
            <td>{{ bill.patient_name }}</td>
            <td>{{ bill.service }}</td>
            <td>KES {{ bill.amount }}</td>
            <td>{{ bill.date }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
