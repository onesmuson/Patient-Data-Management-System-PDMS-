<h2>Billing</h2>

<!-- Add Bill Form -->
<form method="POST" action="{{ url_for('billing') }}">
    <label>Patient:</label>
    <select name="patient_id" required>
        <option value="">Select Patient</option>
        {% for patient in patients %}
            <option value="{{ patient.id }}">{{ patient.full_name }}</option>
        {% endfor %}
    </select>

    <label>Total Amount:</label>
    <input type="number" name="total_amount" required step="0.01">

    <label>Date Issued:</label>
    <input type="date" name="date_issued" required>

    <label>Status:</label>
    <select name="status" required>
        <option value="Pending">Pending</option>
        <option value="Paid">Paid</option>
    </select>

    <button type="submit">Add Bill</button>
</form>

<hr>

<!-- List of Bills -->
<table border="1">
    <tr>
        <th>ID</th>
        <th>Patient</th>
        <th>Total Amount</th>
        <th>Date Issued</th>
        <th>Status</th>
    </tr>
    {% for bill in bills %}
    <tr>
        <td>{{ bill.id }}</td>
        <td>{{ bill.patient.full_name if bill.patient else 'Unknown' }}</td>
        <td>{{ bill.total_amount }}</td>
        <td>{{ bill.date_issued }}</td>
        <td>{{ bill.status }}</td>
    </tr>
    {% endfor %}
</table>
