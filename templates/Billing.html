{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Billing</h2>

<form method="POST" action="{{ url_for('billing') }}">
    <div class="mb-3">
        <label>Patient</label>
        <select name="patient_id" class="form-select" required>
            <option value="">Select Patient</option>
            {% for patient in patients %}
                <option value="{{ patient.id }}">{{ patient.full_name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label>Total Amount</label>
        <input type="number" name="total_amount" step="0.01" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Date Issued</label>
        <input type="date" name="date_issued" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Status</label>
        <select name="status" class="form-select" required>
            <option value="Pending">Pending</option>
            <option value="Paid">Paid</option>
        </select>
    </div>

    <button type="submit" class="btn btn-success">Add Bill</button>
</form>

<hr>

<table class="table table-bordered table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Patient</th>
            <th>Total Amount</th>
            <th>Date Issued</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for bill in bills %}
        <tr>
            <td>{{ bill.id }}</td>
            <td>{{ bill.patient.full_name if bill.patient else 'Unknown' }}</td>
            <td>{{ bill.total_amount }}</td>
            <td>{{ bill.date_issued }}</td>
            <td>{{ bill.status }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
