{% extends 'base.html' %}
{% block content %}
<h3>Billing Section</h3>
<form method="POST" class="mb-4">
  <div class="row">
    <div class="col-md-4 mb-3">
      <input type="text" name="patient_name" class="form-control" placeholder="Patient Name" required>
    </div>
    <div class="col-md-4 mb-3">
      <input type="number" name="amount" step="0.01" class="form-control" placeholder="Amount" required>
    </div>
    <div class="col-md-4 mb-3">
      <select name="status" class="form-control">
        <option>Paid</option>
        <option>Unpaid</option>
      </select>
    </div>
  </div>
  <button class="btn btn-success">Add Bill</button>
</form>

<table class="table table-bordered table-striped">
  <tr>
    <th>ID</th><th>Patient</th><th>Amount</th><th>Status</th>
  </tr>
  {% for b in bills %}
  <tr>
    <td>{{ b.id }}</td>
    <td>{{ b.patient_name }}</td>
    <td>{{ b.amount }}</td>
    <td>{{ b.status }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
