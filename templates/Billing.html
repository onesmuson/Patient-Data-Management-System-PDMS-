<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Billing</title>
</head>
<body>
    <h2>New Bill</h2>
    <form method="POST">
        <label>Patient:</label><br>
        <select name="patient_id" required>
            {% for patient in patients %}
            <option value="{{ patient.id }}">{{ patient.full_name }}</option>
            {% endfor %}
        </select><br>
        <label>Total Amount:</label><br>
        <input type="number" name="total_amount" step="0.01" required><br>
        <label>Date Issued:</label><br>
        <input type="date" name="date_issued" required><br>
        <label>Status:</label><br>
        <select name="status">
            <option value="Unpaid">Unpaid</option>
            <option value="Paid">Paid</option>
        </select><br><br>
        <button type="submit">Add Bill</button>
    </form>
    <hr>
    <h3>All Bills</h3>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Patient</th>
            <th>Total Amount</th>
            <th>Date Issued</th>
            <th>Status</th>
        </tr>
        {% for bill in bills %}
        <tr>
            <td>{{ bill.id }}</td>
            <td>{{ bill.patient.full_name }}</td>
            <td>{{ bill.total_amount }}</td>
            <td>{{ bill.date_issued }}</td>
            <td>{{ bill.status }}</td>
        </tr>
        {% endfor %}
    </table>
    <a href="{{ url_for('index') }}">Dashboard</a>
</body>
</html>
