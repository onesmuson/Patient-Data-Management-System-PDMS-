{% extends "base.html" %}
{% block content %}
<h3>Medical History</h3>

<div class="row">
  <div class="col-md-4">
    <form method="POST" action="{{ url_for('medical_history') }}">
      <div class="mb-2">
        <label class="form-label">Patient</label>
        <select name="patient_id" class="form-select" required>
          <option value="">Select patient</option>
          {% for p in patients %}
            <option value="{{ p.id }}">{{ p.full_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-2">
        <label class="form-label">History</label>
        <textarea class="form-control" name="history" required></textarea>
      </div>
      <button class="btn btn-primary w-100">Save History</button>
    </form>
  </div>

  <div class="col-md-8">
    <table class="table table-striped">
      <thead><tr><th>#</th><th>Patient</th><th>History</th></tr></thead>
      <tbody>
        {% for h in histories %}
        <tr>
          <td>{{ loop.index }}</td>
          <td>{{ h.patient.full_name if h.patient else 'Unknown' }}</td>
          <td>{{ h.history }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
