{% extends "base.html" %}

{% block content %}
<h2>Medical History</h2>
<a href="{{ url_for('add_medical_history') }}" class="btn btn-success mb-3">Add Medical History</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Patient</th>
            <th>History</th>
        </tr>
    </thead>
    <tbody>
        {% for history in histories %}
        <tr>
            <td>{{ history.id }}</td>
            <td>{{ history.patient.full_name }}</td>
            <td>{{ history.history }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
