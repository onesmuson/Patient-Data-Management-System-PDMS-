{% extends "base.html" %}
{% block title %}Medical History{% endblock %}

{% block content %}
<h1>Medical History</h1>
<table>
    <tr><th>ID</th><th>Patient</th><th>History</th></tr>
    {% for h in histories %}
    <tr>
        <td>{{ h.id }}</td>
        <td>{{ h.patient.full_name }}</td>
        <td>{{ h.history }}</td>
    </tr>
    {% endfor %}
</table>
<a href="{{ url_for('add_medical_history') }}" class="btn">Add Medical History</a>
{% endblock %}
