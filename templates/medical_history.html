{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>Patient Medical Histories</h2>
    <table>
        <thead>
            <tr>
                <th>Patient Name</th>
                <th>History</th>
                <th>Date Added</th>
            </tr>
        </thead>
        <tbody>
            {% for record in histories %}
            <tr>
                <td>{{ record.patient.full_name }}</td>
                <td>{{ record.history }}</td>
                <td>{{ record.date_added }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
