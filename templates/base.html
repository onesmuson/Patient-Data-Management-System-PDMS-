<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDMS - Hospital Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('dashboard') }}">PDMS</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a></li>
        <li class="nav-item"><a href="{{ url_for('view_patients') }}" class="nav-link">Patients</a></li>
        <li class="nav-item"><a href="{{ url_for('view_medicines') }}" class="nav-link">Medicines</a></li>
        <li class="nav-item"><a href="{{ url_for('appointment') }}" class="nav-link">Appointments</a></li>
        <li class="nav-item"><a href="{{ url_for('billing') }}" class="nav-link">Billing</a></li>
        <li class="nav-item"><a href="{{ url_for('contacts') }}" class="nav-link">Contacts</a></li>
        <li class="nav-item"><a href="{{ url_for('logout') }}" class="nav-link text-warning">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-info">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
