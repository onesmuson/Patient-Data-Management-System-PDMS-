{% extends "base.html" %}
{% block content %}
<h2>Medicines</h2>
<div class="row">
  <div class="col-md-5">
    <div class="card p-3 card-custom">
      <h5>Add Medicine</h5>
      <form method="POST" action="{{ url_for('medicines') }}">
        <div class="mb-2"><label class="form-label">Name</label><input name="name" class="form-control" required></div>
        <div class="mb-2"><label class="form-label">Description</label><input name="description" class="form-control"></div>
        <div class="mb-2"><label class="form-label">Dosage</label><input name="dosage" class="form-control"></div>
        <div class="mb-2"><label class="form-label">Quantity</label><input name="quantity" type="number" class="form-control"></div>
        <div class="d-grid"><button class="btn btn-accent">Add</button></div>
      </form>
    </div>
  </div>

  <div class="col-md-7">
    <div class="card p-3 card-custom">
      <h5>Inventory</h5>
      <table class="table mt-2">
        <thead><tr><th>#</th><th>Name</th><th>Dosage</th><th>Quantity</th></tr></thead>
        <tbody>
          {% for m in medicines %}
            <tr><td>{{ loop.index }}</td><td>{{ m.name }}</td><td>{{ m.dosage }}</td><td>{{ m.quantity }}</td></tr>
          {% else %}
            <tr><td colspan="4" class="text-muted">No medicines</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
