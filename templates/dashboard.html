{% extends 'base.html' %}
{% block content %}
<h2 class="text-center text-primary mb-4">Welcome to PDMS Dashboard</h2>
<div class="row">
  <div class="col-md-3">
    <div class="card text-center shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Patients</h5>
        <a href="{{ url_for('view_patients') }}" class="btn btn-primary">View Patients</a>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card text-center shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Medicines</h5>
        <a href="{{ url_for('view_medicines') }}" class="btn btn-success">View Medicines</a>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card text-center shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Appointments</h5>
        <a href="{{ url_for('appointment') }}" class="btn btn-warning">Manage</a>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card text-center shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Billing</h5>
        <a href="{{ url_for('billing') }}" class="btn btn-danger">Billing</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
