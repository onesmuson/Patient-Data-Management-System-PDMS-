{% extends "base.html" %}
{% block content %}

<style>
body {
    background: linear-gradient(135deg, #4a148c, #880e4f);
    color: white;
}

.card {
    border-radius: 18px;
    padding: 25px;
    color: white;
}

.card-patients {
    background: #0288d1;
}

.card-appointments {
    background: #7b1fa2;
}

.card-bills {
    background: #c2185b;
}

.big-title {
    font-size: 38px;
    font-weight: bold;
}

.sub-title {
    font-size: 22px;
}
</style>

<div class="container mt-5">
    <h1 class="big-title">Welcome, {{ username }} 👋</h1>
    <p class="sub-title">Today is <strong>{{ today }}</strong></p>

    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card card-patients shadow">
                <h3>Total Patients</h3>
                <h1>{{ total_patients }}</h1>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-appointments shadow">
                <h3>Total Appointments</h3>
                <h1>{{ total_appointments }}</h1>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-bills shadow">
                <h3>Total Bills</h3>
                <h1>{{ total_bills }}</h1>
            </div>
        </div>
    </div>
</div>

{% endblock %}
