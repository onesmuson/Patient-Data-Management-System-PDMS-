{% extends "base.html" %}
{% block content %}
<h2>Add New Patient</h2>

<form method="POST" action="{{ url_for('add_patient') }}">
    <label for="name">Full Name</label>
    <input type="text" name="name" id="name" placeholder="Enter full name" required>

    <label for="age">Age</label>
    <input type="number" name="age" id="age" placeholder="Enter age" required>

    <label for="gender">Gender</label>
    <select name="gender" id="gender" required>
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>

    <label for="condition">Condition / Diagnosis</label>
    <input type="text" name="condition" id="condition" placeholder="Enter condition" required>

    <input type="submit" value="Add Patient">
</form>
{% endblock %}
