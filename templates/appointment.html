{% extends "base.html" %}
{% block content %}
<h2>Appointments</h2>
<form method="POST">
<div class="mb-3"><label>Patient</label><select name="patient_id" class="form-select" required>
<option value="">Select Patient</option>
{% for patient in patients %}
<option value="{{ patient.id }}">{{ patient.full_name }}</option>
{% endfor %}
</select></div>
<div class="mb-3"><label>Date</label><input type="date" name="date" class="form-control" required></div>
<div class="mb-3"><label>Time</label><input type="time" name="time" class="form-control" required></div>
<div class="mb-3"><label>Reason</label><textarea name="reason" class="form-control"></textarea></div>
<button type="submit" class="btn btn-primary">Add Appointment</button>
</form>

<hr>
<table class="table table-striped">
<thead><tr><th>#</th><th>Patient</th><th>Date</th><th>Time</th><th>Reason</th></tr></thead>
<tbody>
{% for appointment in appointments %}
<tr>
<td>{{ loop.index }}</td>
<td>{{ appointment.patient.full_name }}</td>
<td>{{ appointment.date }}</td>
<td>{{ appointment.time }}</td>
<td>{{ appointment.reason }}</td>
</tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
