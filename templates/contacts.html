{% extends "base.html" %}
{% block title %}Contacts - PDMS{% endblock %}

{% block content %}
<h2>Send Message</h2>
<form method="POST">
    <label>Name:</label>
    <input type="text" name="name" required>
    
    <label>Email:</label>
    <input type="email" name="email">
    
    <label>Message:</label>
    <textarea name="message" rows="4"></textarea>
    
    <input type="submit" value="Send Message">
</form>

<h2>All Messages</h2>
<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
    </tr>
    {% for msg in messages %}
    <tr>
        <td>{{ msg.id }}</td>
        <td>{{ msg.name }}</td>
        <td>{{ msg.email }}</td>
        <td>{{ msg.message }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
