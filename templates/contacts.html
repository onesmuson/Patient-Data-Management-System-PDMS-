{% extends "base.html" %}

{% block content %}
<h2>Contacts / Messages</h2>
<form method="POST" class="mb-4">
    <div class="row">
        <div class="col-md-3"><input type="text" name="name" class="form-control" placeholder="Name" required></div>
        <div class="col-md-3"><input type="email" name="email" class="form-control" placeholder="Email" required></div>
        <div class="col-md-4"><input type="text" name="message" class="form-control" placeholder="Message" required></div>
        <div class="col-md-2"><button type="submit" class="btn btn-primary">Send Message</button></div>
    </div>
</form>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
        </tr>
    </thead>
    <tbody>
        {% for msg in messages %}
        <tr>
            <td>{{ msg.id }}</td>
            <td>{{ msg.name }}</td>
            <td>{{ msg.email }}</td>
            <td>{{ msg.message }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
