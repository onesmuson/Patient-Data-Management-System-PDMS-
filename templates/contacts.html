{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Contacts / Messages</h2>
  <form method="POST" action="{{ url_for('contacts') }}">
    <label>Name</label><input class="form-control" name="name" type="text">
    <label>Email</label><input class="form-control" name="email" type="email">
    <label>Message</label><textarea class="form-control" name="message"></textarea>
    <div style="margin-top:10px;"><button class="btn btn-primary" type="submit">Send</button></div>
  </form>
</div>

<div class="card">
  <h3>Messages</h3>
  {% if messages %}
    <table class="table">
      <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Message</th></tr></thead>
      <tbody>
        {% for m in messages %}
          <tr><td>{{ loop.index }}</td><td>{{ m.name }}</td><td>{{ m.email }}</td><td>{{ m.message }}</td></tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p>No messages yet.</p>
  {% endif %}
</div>
{% endblock %}
