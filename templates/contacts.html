{% extends "base.html" %}
{% block content %}
<h2>Contacts</h2>
<div class="row">
  <div class="col-md-5">
    <div class="card p-3 card-custom">
      <h5>Send Message</h5>
      <form method="POST" action="{{ url_for('contacts') }}">
        <div class="mb-2"><label class="form-label">Name</label><input name="name" class="form-control" required></div>
        <div class="mb-2"><label class="form-label">Email</label><input name="email" class="form-control" required></div>
        <div class="mb-2"><label class="form-label">Message</label><textarea name="message" class="form-control"></textarea></div>
        <div class="d-grid"><button class="btn btn-accent">Send</button></div>
      </form>
    </div>
  </div>

  <div class="col-md-7">
    <div class="card p-3 card-custom">
      <h5>Messages</h5>
      <ul class="list-group mt-2">
        {% for m in messages %}
          <li class="list-group-item"><strong>{{ m.name }}</strong> <div class="small text-muted">{{ m.email }}</div><div class="mt-2">{{ m.message }}</div></li>
        {% else %}
          <li class="list-group-item text-muted">No messages</li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
{% endblock %}
