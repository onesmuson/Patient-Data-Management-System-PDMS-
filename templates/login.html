<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    background: linear-gradient(135deg, #1a237e, #0d47a1);
    font-family: Arial;
    color: white;
}

.container {
    margin-top: 120px;
    width: 400px;
    background: rgba(255,255,255,0.15);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 14px;
    background: #ff6f00;
    border: none;
    color: white;
    font-size: 18px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Login to PDMS</h2>

    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>

    <p><a href="/register" style="color: yellow;">Register</a></p>
    <p><a href="/forgot_password" style="color: yellow;">Forgot Password?</a></p>
</div>

</body>
</html>
