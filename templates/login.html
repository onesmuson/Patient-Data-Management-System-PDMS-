{% extends "base.html" %}
{% block title %}Login - PDMS{% endblock %}

{% block content %}
<h2>Login</h2>
<form method="POST">
    <label>Username:</label>
    <input type="text" name="username" required>
    
    <label>Password:</label>
    <input type="password" name="password" required>
    
    <input type="submit" value="Login">
</form>
{% endblock %}
