{% extends "base.html" %}
{% block title %}Add Medical History{% endblock %}

{% block content %}
<h1>Add Medical History</h1>
<form method="POST">
    <select name="patient_id">
        {% for p in patients %}
            <option value="{{ p.id }}">{{ p.full_name }}</option>
        {% endfor %}
    </select>
    <textarea name="history" placeholder="Enter medical history"></textarea>
    <button type="submit">Add History</button>
</form>
{% endblock %}
