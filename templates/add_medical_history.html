{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Add Medical History</h2>

<div class="card shadow">
    <div class="card-body">

        <form method="POST" action="{{ url_for('add_medical_history') }}">
            <div class="mb-3">
                <label class="form-label">Patient Name</label>
                <input type="text" name="patient_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Medical Condition</label>
                <input type="text" name="condition" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Treatment</label>
                <input type="text" name="treatment" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success">Save Record</button>
        </form>

    </div>
</div>

{% endblock %}
