{% extends "base.html" %}
{% block content %}
<h3>Medicines</h3>
<a class="btn btn-sm btn-primary mb-3" href="{{ url_for('add_medicine') }}">Add medicine</a>
<table class="table table-striped">
  <thead><tr><th>#</th><th>Name</th><th>Dosage</th><th>Qty</th><th>Description</th></tr></thead>
  <tbody>
    {% for m in medicines %}
    <tr>
      <td>{{ loop.index }}</td>
      <td>{{ m.name }}</td>
      <td>{{ m.dosage or '-' }}</td>
      <td>{{ m.quantity or 0 }}</td>
      <td>{{ m.description or '-' }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
