<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Medicines</title>
</head>
<body>
    <h2>All Medicines</h2>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
            <th>Dosage</th>
            <th>Quantity</th>
        </tr>
        {% for med in medicines %}
        <tr>
            <td>{{ med.id }}</td>
            <td>{{ med.name }}</td>
            <td>{{ med.description }}</td>
            <td>{{ med.dosage }}</td>
            <td>{{ med.quantity }}</td>
        </tr>
        {% endfor %}
    </table>
    <a href="{{ url_for('add_medicine') }}">Add New Medicine</a> |
    <a href="{{ url_for('index') }}">Dashboard</a>
</body>
</html>
