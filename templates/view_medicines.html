{% extends 'base.html' %}
{% block content %}
<h3>Medicine Inventory</h3>
<a href="{{ url_for('add_medicine') }}" class="btn btn-success mb-3">Add New Medicine</a>
<table class="table table-bordered table-striped">
  <tr>
    <th>ID</th><th>Name</th><th>Category</th><th>Quantity</th><th>Price</th>
  </tr>
  {% for m in medicines %}
  <tr>
    <td>{{ m.id }}</td>
    <td>{{ m.name }}</td>
    <td>{{ m.category }}</td>
    <td>{{ m.quantity }}</td>
    <td>{{ m.price }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
